<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollama Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #app {
      width: 100%;
      max-width: 720px;
      height: 100vh;
      max-height: 700px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    /* Header */
    #header {
      padding: 14px 18px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #4caf50;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #111;
    }

    #model-badge {
      font-size: 12px;
      background: #f0f0f0;
      color: #555;
      padding: 3px 9px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }

    #clear-btn {
      margin-left: auto;
      font-size: 13px;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 8px;
    }

    #clear-btn:hover { background: #f5f5f5; color: #333; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.bot {
      align-self: flex-start;
      background: #f0f0f0;
      color: #111;
      border-bottom-left-radius: 4px;
    }

    .msg.thinking {
      opacity: 0.55;
      font-style: italic;
    }

    /* Footer */
    #footer {
      padding: 12px 16px;
      border-top: 1px solid #e8e8e8;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #prompt-input {
      flex: 1;
      resize: none;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      min-height: 40px;
      max-height: 120px;
      overflow-y: auto;
      outline: none;
      transition: border-color 0.15s;
    }

    #prompt-input:focus { border-color: #1a73e8; }

    #send-btn {
      padding: 9px 20px;
      border-radius: 10px;
      border: none;
      background: #1a73e8;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      height: 40px;
      transition: background 0.15s;
    }

    #send-btn:hover { background: #1558b0; }
    #send-btn:disabled { background: #a0c0f0; cursor: not-allowed; }
  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="status-dot"></div>
    <h1>Ollama</h1>
    <span id="model-badge">qwen3.5:0.8b</span>
    <button id="clear-btn" onclick="clearChat()">Clear</button>
  </div>

  <div id="messages">
    <div class="msg bot">Hello! How can I help you today?</div>
  </div>

  <div id="footer">
    <textarea id="prompt-input" placeholder="Type a message... (Enter to send)" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
